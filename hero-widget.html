     (más el <style> y el <script type="text/babel">) directo a tu hero.

  Para integrarlo como componente React nativo, usa IATechLabsHeroWidget.jsx.

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --w-bg: #0a1124;
    --w-bg-2: #121b33;
    --w-bg-3: #1a2545;
    --w-fg: #ffffff;
    --w-fg-2: #d5dae3;
    --w-fg-3: #97a0b3;
    --w-line: rgba(255,255,255,0.10);
    --w-line-2: rgba(255,255,255,0.20);
    --w-accent: #ff7a30;
    --w-accent-2: #4c8ef5;
    --w-green: #00d27a;
    --w-pink: #ec4899;
    --w-purple: #a78bfa;
    --w-teal: #38bdf8;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: transparent;
    color: var(--w-fg);
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
  }
  #root {
    width: 100%;
    height: 100vh;
    display: grid;
    place-items: center;
    padding: 16px;
  }

  /* ============================================ */
  .iatl-ops {
    position: relative;
    width: 100%;
    max-width: 620px;
    aspect-ratio: 5 / 6;
    background: linear-gradient(135deg, var(--w-bg-2) 0%, #0d1530 100%);
    border-radius: 22px;
    border: 1px solid var(--w-line);
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04) inset,
      0 30px 80px rgba(0,0,0,0.5),
      0 0 80px rgba(76,142,245,0.15),
      0 0 80px rgba(255,122,48,0.10);
  }
  .iatl-ops::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
  }

  .iatl-toolbar {
    position: relative;
    height: 42px;
    background: rgba(10,17,36,0.7);
    border-bottom: 1px solid var(--w-line);
    display: flex; align-items: center; padding: 0 14px; gap: 10px;
    z-index: 6;
    backdrop-filter: blur(8px);
  }
  .iatl-toolbar .dots { display: flex; gap: 5px; }
  .iatl-toolbar .dots span {
    width: 9px; height: 9px; border-radius: 50%; background: rgba(255,255,255,0.20);
  }
  .iatl-toolbar .dots span:nth-child(1) { background: #ff5f57; }
  .iatl-toolbar .dots span:nth-child(2) { background: #febc2e; }
  .iatl-toolbar .dots span:nth-child(3) { background: #28c840; }
  .iatl-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--w-fg-3);
    letter-spacing: 0.04em;
    flex: 1; text-align: center;
  }
  .iatl-title .name { color: var(--w-fg-2); }
  .iatl-live-dot {
    width: 7px; height: 7px;
    background: var(--w-green);
    border-radius: 50%;
    display: inline-block;
    margin: 0 6px 0 8px;
    vertical-align: 1px;
    box-shadow: 0 0 8px var(--w-green);
    animation: iatlPulse 1.4s ease-in-out infinite;
  }
  @keyframes iatlPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.85); }
  }
  .iatl-title .live-label { color: var(--w-green); }

  .iatl-canvas {
    position: absolute;
    top: 42px; left: 0; right: 0; bottom: 92px;
    padding: 22px 18px;
  }

  .iatl-svg {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }
  .iatl-conn {
    fill: none;
    stroke: rgba(255,255,255,0.10);
    stroke-width: 1.4;
    stroke-linecap: round;
    transition: stroke 0.4s ease, stroke-width 0.4s ease;
  }
  .iatl-conn.active {
    stroke: rgba(255,122,48,0.55);
    stroke-width: 1.8;
    filter: drop-shadow(0 0 4px rgba(255,122,48,0.6));
  }
  .iatl-conn.out.active { stroke: rgba(76,142,245,0.6); filter: drop-shadow(0 0 4px rgba(76,142,245,0.6)); }
  .iatl-packet { filter: drop-shadow(0 0 6px currentColor) drop-shadow(0 0 12px currentColor); }

  .iatl-channel {
    position: absolute;
    width: 130px;
    background: rgba(26,37,69,0.85);
    backdrop-filter: blur(10px);
    border: 1px solid var(--w-line-2);
    border-radius: 11px;
    padding: 9px 10px;
    display: flex; align-items: center; gap: 9px;
    z-index: 3;
    transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
  }
  .iatl-channel.flashing { transform: scale(1.05); }
  .iatl-channel.flashing.in { border-color: var(--w-accent); box-shadow: 0 0 22px rgba(255,122,48,0.40); }
  .iatl-channel.flashing.out { border-color: var(--w-accent-2); box-shadow: 0 0 22px rgba(76,142,245,0.40); }

  .iatl-ch-icon {
    width: 30px; height: 30px;
    border-radius: 8px;
    display: grid; place-items: center;
    font-size: 15px;
    flex-shrink: 0;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--w-line);
  }
  .iatl-ch-icon.green  { background: rgba(0,210,122,0.13);  color: var(--w-green);    border-color: rgba(0,210,122,0.30); }
  .iatl-ch-icon.orange { background: rgba(255,122,48,0.14); color: var(--w-accent);   border-color: rgba(255,122,48,0.30); }
  .iatl-ch-icon.blue   { background: rgba(76,142,245,0.14); color: var(--w-accent-2); border-color: rgba(76,142,245,0.30); }
  .iatl-ch-icon.purple { background: rgba(167,139,250,0.14);color: var(--w-purple);   border-color: rgba(167,139,250,0.30); }
  .iatl-ch-icon.pink   { background: rgba(236,72,153,0.14); color: var(--w-pink);     border-color: rgba(236,72,153,0.30); }
  .iatl-ch-icon.teal   { background: rgba(56,189,248,0.14); color: var(--w-teal);     border-color: rgba(56,189,248,0.30); }

  .iatl-ch-info { min-width: 0; flex: 1; }
  .iatl-ch-label { font-size: 12px; font-weight: 600; color: var(--w-fg); line-height: 1.1; letter-spacing: -0.005em; }
  .iatl-ch-sub { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; color: var(--w-fg-3); margin-top: 2px; letter-spacing: 0.02em; }

  .iatl-core {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 130px; height: 130px;
    z-index: 4;
    display: grid; place-items: center;
  }
  .iatl-core::before {
    content: '';
    position: absolute;
    inset: -28px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,122,48,0.35), transparent 60%);
    filter: blur(20px);
    animation: iatlCoreGlow 3s ease-in-out infinite;
  }
  .iatl-core::after {
    content: '';
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(76,142,245,0.30), transparent 60%);
    filter: blur(14px);
    animation: iatlCoreGlow 3s ease-in-out infinite reverse;
  }
  @keyframes iatlCoreGlow {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50%      { opacity: 1;   transform: scale(1.1); }
  }
  .iatl-core-shape { position: relative; width: 110px; height: 110px; display: grid; place-items: center; z-index: 2; }
  .iatl-core-bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #1a2545, #0a1124);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.10) inset;
  }
  .iatl-core-bg::before {
    content: ''; position: absolute; inset: 2px;
    background: linear-gradient(135deg, #0d1530, #0a1124);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  }
  .iatl-core-img {
    position: relative; z-index: 2;
    width: 70px; height: 70px;
    object-fit: contain;
    filter: drop-shadow(0 0 12px rgba(255,122,48,0.55)) drop-shadow(0 0 12px rgba(76,142,245,0.45));
  }
  .iatl-core-rotate {
    position: absolute; inset: -14px;
    border: 1px dashed rgba(255,255,255,0.18);
    border-radius: 50%;
    animation: iatlSpin 18s linear infinite;
  }
  .iatl-core-rotate::before {
    content: ''; position: absolute; top: -3px; left: 50%;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--w-accent); transform: translateX(-50%);
    box-shadow: 0 0 10px var(--w-accent);
  }
  .iatl-core-rotate::after {
    content: ''; position: absolute; bottom: -3px; left: 50%;
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--w-accent-2); transform: translateX(-50%);
    box-shadow: 0 0 10px var(--w-accent-2);
  }
  @keyframes iatlSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .iatl-core-label {
    position: absolute; bottom: -22px; left: 50%;
    transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px; letter-spacing: 0.10em;
    color: var(--w-accent);
    text-transform: uppercase;
    white-space: nowrap;
    font-weight: 600;
  }

  .iatl-kpi-bar {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 92px;
    background: rgba(10,17,36,0.85);
    backdrop-filter: blur(14px);
    border-top: 1px solid var(--w-line);
    padding: 14px 18px;
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 0;
    z-index: 5;
  }
  .iatl-kpi { padding: 0 12px; border-right: 1px solid var(--w-line); display: flex; flex-direction: column; justify-content: center; }
  .iatl-kpi:last-child { border-right: 0; }
  .iatl-kpi .lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--w-fg-3); margin-bottom: 4px;
  }
  .iatl-kpi .val {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px; font-weight: 600; color: var(--w-fg);
    line-height: 1; letter-spacing: -0.025em;
    font-variant-numeric: tabular-nums;
  }
  .iatl-kpi .val .unit { font-size: 13px; color: var(--w-fg-2); font-weight: 500; margin-left: 2px; }
  .iatl-kpi .delta { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; color: var(--w-green); margin-top: 3px; letter-spacing: 0.02em; }
</style>

const INPUTS = [
  { id: 'whatsapp',  icon: '💬', label: 'WhatsApp',  sub: 'mensajería',  iconCls: 'green' },
  { id: 'instagram', icon: '📷', label: 'Instagram', sub: 'DMs',         iconCls: 'pink' },
  { id: 'web',       icon: '🌐', label: 'Sitio Web', sub: 'formulario',  iconCls: 'blue' },
  { id: 'email',     icon: '📧', label: 'Email',     sub: 'bandeja',     iconCls: 'purple' },
];

const OUTPUTS = [
  { id: 'calendar', icon: '📅', label: 'Calendar', sub: 'agenda hora',  iconCls: 'blue' },
  { id: 'sheets',   icon: '📊', label: 'Sheets',   sub: 'guarda datos', iconCls: 'green' },
  { id: 'gmail',    icon: '📧', label: 'Gmail',    sub: 'responde',     iconCls: 'orange' },
  { id: 'pago',     icon: '💳', label: 'Pagos',    sub: 'cobra',        iconCls: 'teal' },
];

function IATechLabsHeroWidget() {
  const [activeIn, setActiveIn] = useState(null);
  const [activeOuts, setActiveOuts] = useState([]);
  const [packetsIn, setPacketsIn] = useState([]);
  const [packetsOut, setPacketsOut] = useState([]);
  const [coreFlash, setCoreFlash] = useState(false);
  const [kpis, setKpis] = useState({ runs: 1247, accuracy: 96.4, time: 18, roi: 4.2 });
  const containerRef = useRef(null);
  const [size, setSize] = useState({ w: 540, h: 540 });

  useEffect(() => {
    function measure() {
      if (!containerRef.current) return;
      const r = containerRef.current.getBoundingClientRect();
      setSize({ w: r.width, h: r.height });
    }
    measure();
    const ro = new ResizeObserver(measure);
    if (containerRef.current) ro.observe(containerRef.current);
    window.addEventListener('resize', measure);
    return () => { ro.disconnect(); window.removeEventListener('resize', measure); };
  }, []);

  useEffect(() => {
    let tid; let cancelled = false;
    function step() {
      const inIdx = Math.floor(Math.random() * INPUTS.length);
      const outCount = 1 + Math.floor(Math.random() * 3);
      const outIdxs = [];
      while (outIdxs.length < outCount) {
        const c = Math.floor(Math.random() * OUTPUTS.length);
        if (!outIdxs.includes(c)) outIdxs.push(c);
      }

      setActiveIn(inIdx);
      setPacketsIn([{ id: Date.now(), idx: inIdx }]);

      setTimeout(() => {
        if (cancelled) return;
        setCoreFlash(true);
        setActiveOuts(outIdxs);
        setPacketsOut(outIdxs.map((idx, i) => ({ id: Date.now() + i, idx })));
        setPacketsIn([]);
      }, 700);

      setTimeout(() => { if (!cancelled) setCoreFlash(false); }, 1100);

      setTimeout(() => {
        if (cancelled) return;
        setActiveIn(null);
        setActiveOuts([]);
        setPacketsOut([]);
      }, 1500);

      setKpis((k) => ({
        runs: k.runs + 1,
        accuracy: Math.max(95, Math.min(99, k.accuracy + (Math.random() - 0.5) * 0.2)),
        time: k.time + (Math.random() < 0.3 ? 0.01 : 0),
        roi: Math.max(4, Math.min(4.5, k.roi + (Math.random() - 0.5) * 0.05)),
      }));

      tid = setTimeout(step, 1600);
    }
    tid = setTimeout(step, 600);
    return () => { cancelled = true; clearTimeout(tid); };
  }, []);

  const { w, h } = size;
  const xLeft  = 18;
  const xRight = w - 130 - 18;
  const xCenter = w / 2;
  const yCenter = h / 2 - 8;
  const stepY = Math.min(58, (h - 70) / 4);
  const topY = (h - stepY * 4) / 2 - 4;
  const inputPositions = INPUTS.map((_, i) => ({ x: xLeft, y: topY + stepY * i }));
  const outputPositions = OUTPUTS.map((_, i) => ({ x: xRight, y: topY + stepY * i }));
  const inEdge  = (p) => ({ x: p.x + 130, y: p.y + 24 });
  const outEdge = (p) => ({ x: p.x, y: p.y + 24 });
  const corePt = { x: xCenter, y: yCenter };
  const bezier = (a, b) => {
    const cx = (a.x + b.x) / 2;
    return `M ${a.x} ${a.y} C ${cx} ${a.y}, ${cx} ${b.y}, ${b.x} ${b.y}`;
  };

  return (
    <div className="iatl-ops">
      <div className="iatl-toolbar">
        <div className="dots"><span></span><span></span><span></span></div>
        <div className="iatl-title">
          <span className="name">centro-operaciones</span>
          <span className="iatl-live-dot"></span><span className="live-label">live</span>
        </div>
      </div>

      <div className="iatl-canvas" ref={containerRef}>
        <svg className="iatl-svg" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
          {inputPositions.map((p, i) => {
            const path = bezier(inEdge(p), corePt);
            return <path key={`in-${i}`} id={`iatl-in-${i}`} d={path}
                         className={`iatl-conn in ${activeIn === i ? 'active' : ''}`} />;
          })}
          {outputPositions.map((p, i) => {
            const path = bezier(corePt, outEdge(p));
            return <path key={`out-${i}`} id={`iatl-out-${i}`} d={path}
                         className={`iatl-conn out ${activeOuts.includes(i) ? 'active' : ''}`} />;
          })}
          {packetsIn.map((pk) => (
            <circle key={pk.id} r="5" className="iatl-packet"
                    style={{ color: '#ff7a30', fill: '#ff7a30' }}>
              <animateMotion dur="0.7s" repeatCount="1" fill="freeze">
                <mpath href={`#iatl-in-${pk.idx}`} />
              </animateMotion>
            </circle>
          ))}
          {packetsOut.map((pk) => (
            <circle key={pk.id} r="5" className="iatl-packet"
                    style={{ color: '#4c8ef5', fill: '#4c8ef5' }}>
              <animateMotion dur="0.7s" repeatCount="1" fill="freeze">
                <mpath href={`#iatl-out-${pk.idx}`} />
              </animateMotion>
            </circle>
          ))}
        </svg>

        {INPUTS.map((c, i) => {
          const p = inputPositions[i];
          return (
            <div key={c.id}
                 className={`iatl-channel in ${activeIn === i ? 'flashing' : ''}`}
                 style={{ left: p.x, top: p.y }}>
              <div className={`iatl-ch-icon ${c.iconCls}`}>{c.icon}</div>
              <div className="iatl-ch-info">
                <div className="iatl-ch-label">{c.label}</div>
                <div className="iatl-ch-sub">{c.sub}</div>
              </div>
            </div>
          );
        })}

        {OUTPUTS.map((c, i) => {
          const p = outputPositions[i];
          return (
            <div key={c.id}
                 className={`iatl-channel out ${activeOuts.includes(i) ? 'flashing' : ''}`}
                 style={{ left: p.x, top: p.y }}>
              <div className={`iatl-ch-icon ${c.iconCls}`}>{c.icon}</div>
              <div className="iatl-ch-info">
                <div className="iatl-ch-label">{c.label}</div>
                <div className="iatl-ch-sub">{c.sub}</div>
              </div>
            </div>
          );
        })}

        <div className="iatl-core" style={{
          transform: `translate(-50%, -50%) ${coreFlash ? 'scale(1.08)' : 'scale(1)'}`,
          transition: 'transform 0.3s ease',
        }}>
          <div className="iatl-core-rotate"></div>
          <div className="iatl-core-shape">
            <div className="iatl-core-bg"></div>
            <img className="iatl-core-img" src={LOGO_DATA_URL} alt="IATechLabs" />
          </div>
          <div className="iatl-core-label">IA · CORE</div>
        </div>
      </div>

      <div className="iatl-kpi-bar">
        <div className="iatl-kpi">
          <div className="lbl">Procesos hoy</div>
          <div className="val">{Math.floor(kpis.runs).toLocaleString('es-CL')}</div>
          <div className="delta">↑ +247 vs ayer</div>
        </div>
        <div className="iatl-kpi">
          <div className="lbl">Precisión IA</div>
          <div className="val">{kpis.accuracy.toFixed(1)}<span className="unit">%</span></div>
          <div className="delta">↑ 7d estable</div>
        </div>
        <div className="iatl-kpi">
          <div className="lbl">Horas ahorradas</div>
          <div className="val">{Math.floor(kpis.time)}<span className="unit">h/sem</span></div>
          <div className="delta">↑ +12% mes</div>
        </div>
        <div className="iatl-kpi">
          <div className="lbl">ROI promedio</div>
          <div className="val">{kpis.roi.toFixed(1)}<span className="unit">x</span></div>
          <div className="delta">en 6 meses</div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<IATechLabsHeroWidget />);
</script>
</body>
</html>
